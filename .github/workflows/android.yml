name: Build Android APK

# This sandbox can't reach Google's Android Maven/SDK servers, so the APK
# is built here on GitHub's runners instead — they have the Android SDK
# preinstalled and full internet. Every push (or a manual run) produces a
# sideloadable debug APK you download from the run's Artifacts. No Android
# Studio, no Mac, nothing to install locally.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.json'
      - 'vite.config.js'
      - '.github/workflows/android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ubuntu-latest ships the Android SDK; this just puts it on PATH.
      - uses: android-actions/setup-android@v3

      - name: Install deps
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Sync Capacitor → Android
        run: npx cap sync android

      - name: Assemble debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pond-hopping-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
