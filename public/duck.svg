<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Beret duck — Pond Hopping mark -->
  <g>
    <!-- legs -->
    <path d="M232 392 L222 448 L186 462" fill="none" stroke="#101010" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M300 396 L306 452 L342 460" fill="none" stroke="#101010" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- body + head -->
    <path d="M118 262
             C 126 240, 146 230, 136 200
             C 150 214, 160 212, 152 186
             C 172 206, 200 202, 224 180
             C 248 156, 284 128, 324 130
             C 366 132, 398 162, 402 200
             C 404 222, 394 240, 378 252
             C 390 294, 380 340, 344 372
             C 308 404, 240 414, 192 392
             C 138 366, 108 310, 118 262 Z"
          fill="#101010"/>
    <!-- beak: pointed wedge, slightly down-tilted -->
    <path d="M394 178
             C 424 164, 458 168, 476 186
             C 480 190, 478 196, 470 200
             C 444 212, 412 212, 394 204
             C 388 194, 388 186, 394 178 Z"
          fill="#3F9B48"/>
    <path d="M400 200 C 424 208, 450 206, 466 198" fill="none" stroke="#101010" stroke-width="6" stroke-linecap="round"/>
    <circle cx="428" cy="182" r="5" fill="#101010"/>
    <!-- eye: white with side pupil, flat annoyed lid -->
    <ellipse cx="352" cy="180" rx="25" ry="21" fill="#F4F1EA"/>
    <circle cx="365" cy="184" r="9" fill="#101010"/>
    <path d="M326 166 L 380 160" stroke="#101010" stroke-width="11" stroke-linecap="round"/>
    <!-- beret: flatter, tilted, hugging the brow -->
    <path d="M262 140
             C 252 104, 296 70, 344 72
             C 390 74, 422 98, 418 122
             C 416 136, 398 144, 374 146
             C 330 152, 284 156, 262 140 Z"
          fill="#3F9B48"/>
    <path d="M330 70 C 324 54, 340 44, 352 52 C 362 60, 354 74, 342 72"
          fill="#3F9B48"/>
    <!-- wing swoosh -->
    <path d="M180 306
             C 216 346, 280 358, 330 336
             C 298 378, 224 380, 184 340
             C 174 330, 172 316, 180 306 Z"
          fill="#3F9B48"/>
  </g>
</svg>
