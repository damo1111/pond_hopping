<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F5F2EB" />
    <!-- Wrapped in Capacitor the app's origin is capacitor://localhost (iOS) /
         http://localhost (Android). Google Photos' image CDN
         (lh3.googleusercontent.com) 403s requests whose Referer isn't a host
         it likes, which broke every Google-Photos trip cover in the native
         app. Sending no referer is how these public URLs are meant to be
         hotlinked, and every other image host (Wikipedia, Supabase,
         Foursquare, Planespotters) serves fine without one. -->
    <meta name="referrer" content="no-referrer" />
    <!-- Standalone PWA (app-family blueprint §2a) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Pond Hopping" />
    <meta name="application-name" content="Pond Hopping" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600&family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <title>POND HOPPING</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
